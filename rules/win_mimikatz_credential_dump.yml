id: win_mimikatz_credential_dump
title: Mimikatz Credential Dumping
description: Detects the execution of Mimikatz for credential theft
author: null.log
date: 2025/12/08
level: critical
status: stable
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    CommandLine|contains:
      - 'sekurlsa::logonpasswords'
      - 'lsadump::sam'
      - 'privilege::debug'
      - 'sekurlsa::minidump'
  condition: selection
falsepositives:
  - Authorized security testing
  - Penetration testing with approval
tags:
  - attack.credential_access
  - attack.t1003
x_summary: "Someone tried to dump your passwords using Mimikatz"
x_technical: "Mimikatz credential dumping tool detected. This is a serious attack attempting to steal passwords from memory."
x_remediation: |
  1. Immediately disconnect the system from the network
  2. Run full antivirus scan
  3. Reset all user passwords
  4. Review recent login activity
  5. Check for other signs of compromise
x_learning_link: "https://attack.mitre.org/techniques/T1003/"
