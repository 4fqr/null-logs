title: WMI Event Subscription Persistence
id: win_wmi_persistence
status: stable
description: Detects WMI event subscriptions used for persistence
references:
    - https://attack.mitre.org/techniques/T1546/003/
author: null.log
date: 2025/12/08
logsource:
    product: windows
    service: sysmon
detection:
    selection:
        EventID:
            - 19
            - 20
            - 21
    condition: selection
fields:
    - EventType
    - Operation
    - User
falsepositives:
    - Administrative scripts
    - Monitoring software
level: high
tags:
    - attack.persistence
    - attack.t1546.003
explanation:
    simple: "A WMI event was created - attackers use this to run code automatically"
    technical: "WMI Event Subscription detected, allowing code execution on system events without user interaction"
    remediation: "Run 'wmic /namespace:\\\\root\\subscription PATH __EventFilter' to list subscriptions. Remove suspicious ones."
    learning: "https://nullsector.dev/wmi-persistence"
