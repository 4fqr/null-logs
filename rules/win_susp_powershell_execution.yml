id: win_susp_powershell_execution
title: Suspicious PowerShell Execution
description: Detects PowerShell execution with suspicious parameters
author: null.log
date: 2025/12/08
level: high
status: stable
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\powershell.exe'
    CommandLine|contains:
      - '-enc'
      - '-encodedcommand'
      - 'bypass'
      - '-nop'
      - 'hidden'
      - 'downloadstring'
      - 'invoke-expression'
  condition: selection
falsepositives:
  - Legitimate admin scripts
  - Software deployment tools
tags:
  - attack.execution
  - attack.t1059.001
x_summary: "PowerShell was used with suspicious commands that could download malware"
x_technical: "PowerShell executed with encoded commands or execution policy bypass, common in malware delivery."
x_remediation: |
  1. Check what the PowerShell script was trying to do
  2. Review the parent process that launched PowerShell
  3. Scan the system for malware
  4. Enable PowerShell script block logging for better visibility
x_learning_link: "https://attack.mitre.org/techniques/T1059/001/"
